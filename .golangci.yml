version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/karthikcodes/aetronyx
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
        - errcheck
