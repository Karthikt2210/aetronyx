spec_version: "1"
name: refactor-auth
intent: |
  Refactor the authentication module in internal/auth/ to replace
  session-token storage with short-lived JWTs. Update all callers,
  ensure all existing tests pass, and add a test for token expiry.
  Do not touch the database layer or any handler outside internal/auth/.

budget:
  max_cost_usd: 5.00
  max_iterations: 10
  max_wall_time_minutes: 30
  max_tokens: 500000

acceptance_criteria:
  - given: existing test suite
    when: go test ./internal/auth/...
    then: all tests pass with no regressions
  - given: token expiry scenario
    when: go test ./internal/auth/... -run TestTokenExpiry
    then: test exists and passes
  - given: JWT secret in config
    when: aetronyx validate refactor-auth.spec.yaml
    then: spec validates without fatal errors

invariants:
  - Do not modify internal/db/ or any file outside internal/auth/ and its callers.
  - JWT secret must be loaded from environment, never hardcoded.

out_of_scope:
  - Changing the database schema
  - UI changes
  - Adding refresh token support

dependencies:
  files:
    - internal/auth/

test_contracts:
  - name: auth-unit-tests
    command: go test ./internal/auth/...
    maps_to:
      - acceptance_criteria[0]
      - acceptance_criteria[1]

routing_hint:
  planning_model: claude-sonnet-4-6
  execution_model: claude-sonnet-4-6
